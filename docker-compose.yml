version: '3.8'

services:
  bot:
    build: .
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://bot:botpassword@postgres:5432/ache_o_meter
      - SENTRY_ENVIRONMENT=production
    restart: always
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ache_o_meter
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: botpassword
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
